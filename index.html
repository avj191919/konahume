<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Divine Fourth Day</title>
    <style>
        body {
            margin: 0;
            background: radial-gradient(circle, #2c0404, #000);
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            color: white;
        }

        .card {
            background: linear-gradient(145deg, #ff9933, #ff4500); /* Saffron gradient */
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 0 50px rgba(255, 69, 0, 0.6);
            text-align: center;
            border: 4px solid #ffd700; /* Gold border */
            max-width: 300px;
        }

        /* The "Om" Symbol with Gold color */
        .symbol {
            font-size: 80px;
            color: #ffd700;
            text-shadow: 3px 3px 10px rgba(0,0,0,0.5);
            margin: 0;
        }

        /* Combined Moon & God theme */
        .moon-day-4 {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            box-shadow: inset -15px 0px 0 0 #ffd700;
            margin: 20px auto;
            transform: rotate(-15deg);
        }

        h2 {
            margin: 10px 0;
            letter-spacing: 2px;
            text-transform: uppercase;
            font-size: 1.2rem;
            color: #fff;
        }

        .mantra {
            font-size: 0.9rem;
            opacity: 0.9;
            line-height: 1.6;
            border-top: 1px solid rgba(255,255,255,0.3);
            padding-top: 15px;
        }
    </style>
</head>
<body>

    <div class="card">
        <div class="symbol">ॐ</div>
        <div class="moon-day-4"></div>
        <h2>Shree Ganesha</h2>
        <p class="mantra">
            "Om Gan Ganapataye Namah"<br>
            <small>Blessings for the 4th Lunar Day</small>
        </p>
    </div>

</body>
</html>
