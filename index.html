<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .moon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            background-color: #444; /* Dark side */
            position: relative;
            overflow: hidden;
        }
        .moon::before {
            content: "";
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            border-radius: 50%;
            /* Waxing Crescent shape */
            background-color: #f0f0c0; /* Light side */
            transform: translateX(30px); 
        }
    </style>
</head>
<body>
    <div class="moon"></div>
</body>
</html>
