<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        body {
            background: #1a1a1a;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        /* The main container */
        .shivling-container {
            position: relative;
            text-align: center;
        }

        /* The main Lingam body */
        .lingam {
            background: #000;
            height: 180px;
            width: 140px;
            border-radius: 70px 70px 20px 20px;
            position: relative;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            z-index: 2;
        }

        /* The Tripundra (Three Lines) */
        .tripundra {
            position: absolute;
            top: 45px;
            left: 50%;
            transform: translateX(-50%);
            width: 60px;
        }

        .line {
            background: silver;
            height: 4px;
            width: 100%;
            margin: 4px 0;
            border-radius: 2px;
        }

        /* The Red Tilak (Bindu) */
        .tilak {
            background: red;
            height: 10px;
            width: 10px;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            box-shadow: 0 0 5px darkred;
        }

        /* The Base (Pitha) */
        .base {
            background: #000;
            height: 40px;
            width: 220px;
            border-radius: 50%;
            margin-top: -20px;
            position: relative;
            z-index: 1;
        }
    </style>
</head>
<body>
    <div class="shivling-container">
        <div class="lingam">
            <div class="tripundra">
                <div class="line"></div>
                <div class="line">
                    <div class="tilak"></div>
                </div>
                <div class="line"></div>
            </div>
        </div>
        <div class="base"></div>
    </div>
</body>
</html>
