<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Day 4: The Struggle</title>
    <style>
        body {
            background-color: #0b0d17;
            color: #fdfbd3;
            font-family: 'Courier New', Courier, monospace;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            text-align: center;
        }

        /* The "Lazy" Moon */
        .moon {
            width: 100px;
            height: 100px;
            border-radius: 50%;
            box-shadow: inset -25px 0px 0 0 #fdfbd3;
            margin-bottom: 20px;
            animation: snooze 3s ease-in-out infinite;
        }

        @keyframes snooze {
            0%, 100% { transform: rotate(-10deg) scale(1); }
            50% { transform: rotate(-15deg) scale(1.05); }
        }

        .status-box {
            border: 2px solid #fdfbd3;
            padding: 20px;
            border-radius: 10px;
        }

        h1 { font-size: 1.5rem; }
        p { font-style: italic; color: #a0a0a0; }

        .btn {
            margin-top: 15px;
            padding: 10px 20px;
            background: #fdfbd3;
            color: #0b0d17;
            border: none;
            cursor: pointer;
            font-weight: bold;
        }

        .btn:hover { background: #e0debc; }
    </style>
</head>
<body>

    <div class="moon"></div>

    <div class="status-box">
        <h1>LUNAR STATUS: DAY 4</h1>
        <p>"I'm only 15% lit right now. Please come back when I've had my coffee."</p>
        <button class="btn" onclick="alert('The moon is currently on Do Not Disturb mode.')">Poke the Moon</button>
    </div>

</body>
</html>
